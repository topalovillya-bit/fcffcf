    .logo{

    .hero.hidden{display:none}
    .panel,.card{padding:14px}
    .title{font-size:18px; font-weight:900; margin:0}
    .small{font-size:12px; color:var(--muted)}

    .two{grid-template-columns:1fr 1fr}

    .filters.four{grid-template-columns:1fr 1fr 1fr 1fr}

</head>

app.load=()=>{
  try{const raw=localStorage.getItem(STORAGE_KEY); if(raw) app.state={...seed(),...JSON.parse(raw)};}catch(e){}
  if(!app.state.players?.length) app.state.players=defaultPlayers();
  if(!app.state.markers?.length) app.state.markers=defaultMarkers(app.state.formation||'4-3-3');
  if(!app.state.tournaments?.length) app.state.tournaments=[{id:'trn1',name:'Весняний турнір',played:0,wins:0,draws:0,losses:0,goalsFor:0,goalsAgainst:0,points:0}];
  app.ensureRentals();
  if(!app.state.marchImportApplied) app.applyMarchImport();
  app.render();
};
app.save=()=>localStorage.setItem(STORAGE_KEY,JSON.stringify(app.state));

app.ensureRentals=()=>{
  LOCATIONS.forEach(l=>{
    if(!app.state.rentals[l.name]) app.state.rentals[l.name]={paid:false,amount:1500,paidDate:'',note:''};
  });
};
app.applyMarchImport=()=>{
  const key=MARCH_IMPORT_MONTH;
  app.state.players.forEach(p=>{
    const imp=MARCH_IMPORT[normalizeName(p.name)];
    if(!imp || imp.location!==p.location) return;
    p.payments ||= {};
    const base=app.basePrice(p);
    let benefit='none';
    let custom=null;
    const amount=imp.amount;
    if(amount!=null){
      if(Math.round(base*0.9)===Math.round(amount)) benefit='10';
      else if(Math.round(base*0.85)===Math.round(amount)) benefit='15';
      else if(Math.round(base)!==Math.round(amount)) custom=Number(amount);
      p.benefitMode=benefit;
      if(custom!=null) p.customPrice=custom;
      p.payments[key]={
        status: amount >= Math.round((custom ?? base)*(benefit==='10'?0.9:benefit==='15'?0.85:1)) ? 'Оплачено' : 'Частково',
        benefitMode: benefit,
        customPrice: custom,
        amount: Number(amount),
        paidDate:'',
        paidTime:''
      };
      if(imp.note) p.notes = p.notes ? (p.notes + ' | Березень: ' + imp.note) : ('Березень: ' + imp.note);
    }else{
      p.payments[key] ||= {status:'Не оплачено',benefitMode:p.benefitMode||'none',customPrice:p.customPrice||null,amount:app.calcAmount(p),paidDate:'',paidTime:''};
    }
  });
  app.state.marchImportApplied=true;
};
app.setTab=t=>{app.state.tab=t; app.render(); window.scrollTo({top:0,behavior:'smooth'});};
app.basePrice=p=>(LOCATIONS.find(l=>l.name===p.location)?.price)||1400;
app.calcAmount=(p,modeOverride)=>{
  const base=Number(p.customPrice||app.basePrice(p));
  const mode=modeOverride ?? p.benefitMode ?? 'none';
  if(mode==='10') return Math.round(base*0.9);
  if(mode==='15') return Math.round(base*0.85);
  return base;
};
app.payKey=()=>ym(app.state.year,app.state.month);
app.getPayment=(p)=>{
  const key=app.payKey();
  if(!p.payments[key]) p.payments[key]={status:'Не оплачено',benefitMode:p.benefitMode||'none',customPrice:p.customPrice||null,amount:app.calcAmount(p),paidDate:'',paidTime:''};
  const rec=p.payments[key];
  if(rec.customPrice==null && p.customPrice!=null) rec.customPrice=p.customPrice;
  if(!rec.benefitMode) rec.benefitMode=p.benefitMode||'none';
  rec.amount=app.calcAmount({...p,customPrice:rec.customPrice},rec.benefitMode);
  return rec;
};
app.attKey=()=>app.payKey();
app.getAttendanceStatus=(p,loc)=>{
  const key=app.attKey();
  const map=p.attendance[key]||{};
  return map[loc==='Усі'?'global':loc] || (loc==='Усі' ? '—' : map.global||'—');
};
app.setPaymentStatus=(id,status)=>{
  const p=app.state.players.find(x=>x.id===id); if(!p) return;
  const rec=app.getPayment(p); rec.status=status;
  if(status==='Оплачено'||status==='Частково'){const d=new Date(); rec.paidDate=ymd(d); rec.paidTime=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
  else {rec.paidDate=''; rec.paidTime='';}
  app.save(); app.render();
};
app.setBenefit=(id,mode)=>{
  const p=app.state.players.find(x=>x.id===id); if(!p) return;
  p.benefitMode=mode; const rec=app.getPayment(p); rec.benefitMode=mode; rec.amount=app.calcAmount({...p,customPrice:rec.customPrice},mode);
  app.save(); app.renderPayments(); app.renderAnalytics(); app.renderDebtors(); app.renderHero();
};
app.setCustomPrice=(id,val)=>{
  const p=app.state.players.find(x=>x.id===id); if(!p) return;
  const num=Number(val)||null; p.customPrice=num; const rec=app.getPayment(p); rec.customPrice=num; rec.amount=app.calcAmount({...p,customPrice:num},rec.benefitMode);
  app.save(); app.renderPayments(); app.renderAnalytics(); app.renderDebtors(); app.renderHero();
};
app.markAttendance=(id,status)=>{
  const p=app.state.players.find(x=>x.id===id); if(!p) return;
  const key=app.attKey(); p.attendance[key] ||= {};
  p.attendance[key][app.state.attendanceLocation==='Усі' ? 'global' : app.state.attendanceLocation]=status;
  app.save(); app.renderAttendance(); app.renderAnalytics(); app.renderSeasonStats();
};
app.paymentStats=()=>{
  const key=app.payKey(); let paid=0,partial=0,unpaid=0,income=0;
  app.state.players.forEach(p=>{
    const r=p.payments[key]||{status:'Не оплачено',amount:app.calcAmount(p)};
    if(r.status==='Оплачено'){paid++; income+=r.amount;}
    else if(r.status==='Частково'){partial++; income+=Math.round(r.amount/2);}
    else unpaid++;
  });
  return {paid,partial,unpaid,income};
};

app.recalcTournament=t=>{
  const matches=app.state.matches.filter(m=>m.tournamentId===t.id);
  let wins=0,draws=0,losses=0,gf=0,ga=0,played=matches.length;
  matches.forEach(m=>{
    const us=Number(m.scoreUs||0), them=Number(m.scoreThem||0); gf+=us; ga+=them;
    if(us>them) wins++; else if(us===them) draws++; else losses++;
  });
  t.played=played; t.wins=wins; t.draws=draws; t.losses=losses; t.goalsFor=gf; t.goalsAgainst=ga; t.points=wins*3+draws;
};
app.renderTournaments=()=>{
  app.state.tournaments.forEach(app.recalcTournament);
  qs('#section-tournaments').innerHTML=`

function defaultTacticMarkers(formation, prev){
  const keepLabels = {};
  (prev||[]).forEach(m=>{ keepLabels[m.id] = m.label || ''; });
  const base = {
    '4-3-3': [
      [50,90,'1','gold','home'], [18,72,'2','red','home'], [38,74,'3','red','home'], [62,74,'4','red','home'], [82,72,'5','red','home'],
      [28,52,'6','red','home'], [50,48,'8','red','home'], [72,52,'10','red','home'], [20,24,'11','red','home'], [50,18,'9','red','home'], [80,24,'7','red','home'],
    ],
    '4-4-2': [
      [50,90,'1','gold','home'], [18,72,'2','red','home'], [38,74,'3','red','home'], [62,74,'4','red','home'], [82,72,'5','red','home'],
      [18,50,'11','red','home'], [40,52,'6','red','home'], [60,52,'8','red','home'], [82,50,'7','red','home'], [38,22,'9','red','home'], [62,22,'10','red','home'],
    ],
    '3-5-2': [
      [50,90,'1','gold','home'], [26,72,'3','red','home'], [50,74,'4','red','home'], [74,72,'5','red','home'],
      [10,52,'2','red','home'], [30,50,'6','red','home'], [50,48,'8','red','home'], [70,50,'10','red','home'], [90,52,'7','red','home'], [38,22,'9','red','home'], [62,22,'11','red','home'],
    ],
    '4-2-3-1': [
      [50,90,'1','gold','home'], [18,72,'2','red','home'], [38,74,'3','red','home'], [62,74,'4','red','home'], [82,72,'5','red','home'],
      [40,58,'6','red','home'], [60,58,'8','red','home'], [18,38,'11','red','home'], [50,34,'10','red','home'], [82,38,'7','red','home'], [50,18,'9','red','home'],
    ],
    '3-4-3': [
      [50,90,'1','gold','home'], [26,72,'3','red','home'], [50,74,'4','red','home'], [74,72,'5','red','home'],
      [14,50,'2','red','home'], [38,50,'6','red','home'], [62,50,'8','red','home'], [86,50,'7','red','home'],
      [20,22,'11','red','home'], [50,18,'9','red','home'], [80,22,'10','red','home'],
    ]
  };
  const home = (base[formation] || base['4-3-3']).map((m,i)=>({
    id:'h'+(i+1), x:m[0], y:m[1], n:m[2], c:m[3], team:m[4], label:keepLabels['h'+(i+1)] || ''
  }));
  const away = home.map((m,i)=>({
    id:'a'+(i+1), x:m.x, y:100-m.y, n:m.n, c:'blue', team:'away', label:keepLabels['a'+(i+1)] || ''
  }));
  return JSON.parse(JSON.stringify([...home, ...away]));
}

function bindTacticBoard(){
  const board = qs('#tacticBoard'); if(!board) return;
  let active = null;
  let drawing = null;

  board.addEventListener('pointerdown', e=>{
    const tool = app.state.tacticTool || 'move';
    const mk = e.target.closest('.marker');
    const cone = e.target.closest('[data-cone]');
    const rect = board.getBoundingClientRect();
    const x = Math.max(2, Math.min(98, ((e.clientX - rect.left)/rect.width)*100));
    const y = Math.max(2, Math.min(98, ((e.clientY - rect.top)/rect.height)*100));

    if(tool === 'move' && mk){
      active = {type:'marker', id:mk.dataset.tmarker};
      mk.setPointerCapture && mk.setPointerCapture(e.pointerId);
      return;
    }
    if(tool === 'move' && cone){
      active = {type:'cone', id:cone.dataset.cone};
      cone.setPointerCapture && cone.setPointerCapture(e.pointerId);
      return;
    }
    if(tool === 'arrow'){
      drawing = {type:'arrow', x1:x, y1:y, x2:x, y2:y};
      return;
    }
    if(tool === 'zone'){
      drawing = {type:'zone', x1:x, y1:y, x2:x, y2:y};
      return;
    }
    if(tool === 'cone'){
      app.state.tacticCones = app.state.tacticCones || [];
      app.state.tacticCones.push({id:'cone_'+Date.now(), x, y});
      app.save(); app.renderTactics();
    }
  });

  board.addEventListener('pointermove', e=>{
    const rect = board.getBoundingClientRect();
    const x = Math.max(2, Math.min(98, ((e.clientX - rect.left)/rect.width)*100));
    const y = Math.max(2, Math.min(98, ((e.clientY - rect.top)/rect.height)*100));

    if(active){
      if(active.type === 'marker'){
        const m = app.state.tacticMarkers.find(z=>z.id===active.id);
        if(m){
          m.x = x; m.y = y;
          const el = board.querySelector('[data-tmarker="'+active.id+'"]');
          if(el){ el.style.left = x+'%'; el.style.top = y+'%'; }
        }
      } else if(active.type === 'cone'){
        const c = (app.state.tacticCones||[]).find(z=>z.id===active.id);
        if(c){
          c.x = x; c.y = y;
          const el = board.querySelector('[data-cone="'+active.id+'"]');
          if(el){ el.style.left = x+'%'; el.style.top = y+'%'; }
        }
      }
    }

    if(drawing){
      drawing.x2 = x; drawing.y2 = y;
    }
  });

  board.addEventListener('pointerup', ()=>{
    if(active){ app.save(); active = null; }
    if(drawing){
      if(drawing.type === 'arrow'){
        app.state.tacticLines = app.state.tacticLines || [];
        app.state.tacticLines.push({id:'line_'+Date.now(), ...drawing});
      } else if(drawing.type === 'zone'){
        app.state.tacticZones = app.state.tacticZones || [];
        app.state.tacticZones.push({id:'zone_'+Date.now(), ...drawing});
      }
      drawing = null;
      app.save(); app.renderTactics();
    }
  });

  board.addEventListener('click', e=>{
    const tool = app.state.tacticTool || 'move';
    if(tool !== 'move') return;
    const mk = e.target.closest('.marker'); if(!mk) return;
    const m = app.state.tacticMarkers.find(z=>z.id===mk.dataset.tmarker); if(!m) return;
    const val = prompt('Підпис / ім’я гравця', m.label || '');
    if(val !== null){ m.label = val.trim(); app.save(); app.renderTactics(); }
  });
}

document.addEventListener('click',e=>{
  const tab=e.target.closest('[data-tab]'); if(tab){app.setTab(tab.dataset.tab); return;}
  if(e.target.closest('[data-action="close-modal"]') || e.target.id==='modal'){qs('#modal').classList.remove('show'); return;}
  if(e.target.closest('[data-action="export-json"]')){app.exportJson(); return;}
  if(e.target.closest('[data-action="export-csv"]')){app.exportCsv(); return;}
  if(e.target.closest('[data-action="import-open"]')){qs('#importFile').click(); return;}

  const pay=e.target.closest('[data-pay]'); if(pay){const [id,status]=pay.dataset.pay.split('|'); app.setPaymentStatus(id,status); return;}
  const att=e.target.closest('[data-att]'); if(att){const [id,status]=att.dataset.att.split('|'); app.markAttendance(id,status); return;}
  const op=e.target.closest('[data-open-player]'); if(op){app.openPlayer(op.dataset.openPlayer); return;}
  const sn=e.target.closest('[data-save-notes]'); if(sn){const p=app.state.players.find(x=>x.id===sn.dataset.saveNotes); if(p){p.notes=qs('#playerNotes').value; app.save(); qs('#modal').classList.remove('show');} return;}

  const pt=e.target.closest('[data-payroll-toggle]'); if(pt){const key=app.payKey()+'_'+pt.dataset.payrollToggle; const t=TRAINERS.find(x=>x.id===pt.dataset.payrollToggle); app.state.payroll[key] ||= {paid:false,amount:t.salary}; app.state.payroll[key].paid=!app.state.payroll[key].paid; app.save(); app.renderTrainers(); return;}

  const rb=e.target.closest('[data-reset-board]'); if(rb){app.state.markers=defaultMarkers(app.state.formation); app.save(); app.renderTactics(); return;}

  const cm=e.target.closest('[data-create-match]'); if(cm){app.createMatch(); return;}
  const om=e.target.closest('[data-open-match]'); if(om){app.state.selectedMatchId=om.dataset.openMatch; app.save(); app.renderMatchCenter(); return;}
  const sm=e.target.closest('[data-save-match]'); if(sm){
    const m=app.state.matches.find(x=>x.id===sm.dataset.saveMatch); if(!m) return;
    m.opponent=qs('#mcOpponent').value; m.location=qs('#mcPlace').value; m.date=qs('#mcDate').value; m.time=qs('#mcTime').value; m.coach=qs('#mcCoach').value;
    m.formation=qs('#mcFormation').value; m.notes=qs('#mcNotes').value; m.scoreUs=Number(qs('#mcScoreUs').value||0); m.scoreThem=Number(qs('#mcScoreThem').value||0);
    m.tournamentId=qs('#mcTournament').value; m.mvp=qs('#mcMVP').value; app.save(); app.renderMatchCenter(); app.renderSeasonStats(); app.renderTournaments(); return;
  }
  const dm=e.target.closest('[data-delete-match]'); if(dm){app.state.matches=app.state.matches.filter(x=>x.id!==dm.dataset.deleteMatch); if(app.state.selectedMatchId===dm.dataset.deleteMatch) app.state.selectedMatchId=app.state.matches[0]?.id||null; app.save(); app.renderMatchCenter(); app.renderSeasonStats(); app.renderTournaments(); return;}
  const tx=e.target.closest('[data-toggle-xi]'); if(tx){const [mid,pid]=tx.dataset.toggleXi.split('|'); const m=app.state.matches.find(x=>x.id===mid); if(m){const i=m.startingXI.indexOf(pid); if(i>=0) m.startingXI.splice(i,1); else m.startingXI.push(pid); m.activity[pid] ||= {goals:0,assists:0,minutes:0,status:'Не грав'}; if(m.startingXI.includes(pid)) m.activity[pid].status='Старт'; app.save(); app.renderMatchCenter();} return;}

  const at=e.target.closest('[data-add-tournament]'); if(at){const name=prompt('Назва турніру'); if(name){app.state.tournaments.push({id:'t_'+Date.now(),name,played:0,wins:0,draws:0,losses:0,goalsFor:0,goalsAgainst:0,points:0}); app.save(); app.renderTournaments(); app.renderMatchCenter();} return;}
  const rt=e.target.closest('[data-rename-tournament]'); if(rt){const t=app.state.tournaments.find(x=>x.id===rt.dataset.renameTournament); if(t){const name=prompt('Нова назва турніру',t.name); if(name){t.name=name.trim(); app.save(); app.renderTournaments(); app.renderMatchCenter();}} return;}
  const dt=e.target.closest('[data-delete-tournament]'); if(dt){app.state.tournaments=app.state.tournaments.filter(x=>x.id!==dt.dataset.deleteTournament); app.state.matches.forEach(m=>{if(m.tournamentId===dt.dataset.deleteTournament) m.tournamentId='';}); app.save(); app.renderTournaments(); app.renderMatchCenter(); return;}
});

document.addEventListener('change',e=>{
  if(e.target.id==='importFile' && e.target.files[0]) app.importJson(e.target.files[0]);
  if(e.target.dataset.payrollAmount){const id=e.target.dataset.payrollAmount; const key=app.payKey()+'_'+id; const t=TRAINERS.find(x=>x.id===id); app.state.payroll[key] ||= {paid:false,amount:t.salary}; app.state.payroll[key].amount=Number(e.target.value)||0; app.save();}
  if(e.target.dataset.benefitSelect){app.setBenefit(e.target.dataset.benefitSelect,e.target.value);}
  if(e.target.dataset.customPrice){app.setCustomPrice(e.target.dataset.customPrice,e.target.value);}
  if(e.target.dataset.matchStat){const [mid,pid,field]=e.target.dataset.matchStat.split('|'); const m=app.state.matches.find(x=>x.id===mid); if(m){m.activity[pid] ||= {goals:0,assists:0,minutes:0,status:'Не грав'}; m.activity[pid][field]=Number(e.target.value)||0; app.save(); app.renderSeasonStats();}}
  if(e.target.dataset.matchStatus){const [mid,pid]=e.target.dataset.matchStatus.split('|'); const m=app.state.matches.find(x=>x.id===mid); if(m){m.activity[pid] ||= {goals:0,assists:0,minutes:0,status:'Не грав'}; m.activity[pid].status=e.target.value; app.save(); app.renderSeasonStats();}}
});

app.load();
})();
</script>
</body>
</html>
